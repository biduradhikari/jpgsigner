<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Document Signer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
        touch-action: pan-x pan-y;
      }

      header {
        padding: 16px;
        font-size: 20px;
        font-weight: bold;
        background: #111;
        color: white;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      #canvas-container {
        padding: 10px;
        text-align: center;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 300px;
      }

      canvas {
        border-radius: 10px;
        max-width: 100%;
        height: auto;
        border: 1px solid #ccc;
        touch-action: none;
      }

      #controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: white;
        box-shadow: 0 -2px 15px rgba(0, 0, 0, 0.15);
        padding: 16px;
        z-index: 100;
        border-radius: 20px 20px 0 0;
        max-height: 40vh;
        overflow-y: auto;
      }

      .btn {
        width: 100%;
        padding: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 600;
        background: #007bff;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
        touch-action: manipulation;
        min-height: 52px;
      }

      .btn:active {
        transform: scale(0.98);
        opacity: 0.9;
      }

      .btn.secondary {
        background: #6c757d;
      }

      .btn.success {
        background: #28a745;
      }

      .btn.warning {
        background: #ffc107;
        color: #000;
      }

      .button-group {
        display: flex;
        gap: 12px;
        margin: 8px 0;
      }

      .button-group .btn {
        flex: 1;
        margin: 0;
      }

      input[type="file"] {
        display: none;
      }

      .step {
        display: none;
      }

      .step.active {
        display: block;
      }

      #threshold {
        width: 100%;
        margin: 12px 0;
        height: 44px;
      }

      label {
        display: block;
      }


      .canvas-container {
        touch-action: none !important;
      }


      input,
      textarea,
      [contenteditable="true"] {
        font-size: 16px !important;
      }


      .upper-canvas ~ textarea {
        font-size: 16px !important;
        line-height: 1.4 !important;
        padding: 12px !important;
        border-radius: 8px !important;
        background: white !important;
        border: 2px solid #007bff !important;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1) !important;
        min-width: 200px !important;
        max-width: 90vw !important;
        width: auto !important;
        white-space: pre-wrap !important;
        word-wrap: break-word !important;
        overflow: auto !important;
        resize: none !important;
        position: fixed !important;
        z-index: 1000 !important;
      }


      .upper-canvas ~ textarea:focus {
        outline: none !important;
        border-color: #0056b3 !important;
        box-shadow: 0 0 0 3px rgba(0,123,255,0.25) !important;
      }

      @media (max-width: 768px) and (orientation: landscape) {
        #controls {
          padding: 8px 16px;
          max-height: 50vh;
        }

        .btn {
          padding: 12px;
          margin: 4px 0;
          min-height: 44px;
          font-size: 15px;
        }

        .button-group {
          gap: 8px;
        }
        
        .upper-canvas ~ textarea {
          font-size: 14px !important;
          padding: 8px !important;
          min-width: 180px !important;
        }
      }

      .text-toolbar {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        border-radius: 30px;
        padding: 8px 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        display: none;
        gap: 12px;
        z-index: 200;
        backdrop-filter: blur(10px);
      }

      .text-toolbar button {
        background: #007bff;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .text-toolbar button:active {
        transform: scale(0.95);
      }
    </style>
  </head>

  <body>
    <header id="title">📄 Step 1: Upload Document</header>

    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
      <!-- STEP 1 -->
      <div class="step active" id="step1">
        <label class="btn">
          📄 Upload Document
          <input type="file" id="uploadBase" accept="image/*" />
        </label>
      </div>

      <!-- STEP 2 -->
      <div class="step" id="step2">
        <label class="btn">
          ✍️ Add Signature
          <input type="file" id="uploadOverlay" accept="image/*" />
        </label>
        <button class="btn secondary" onclick="nextStep(3)">⏭️ Skip</button>
      </div>

      <!-- STEP 3 -->
      <div class="step" id="step3">
        <label style="margin-bottom: 8px; display: block"
          >🎨 Remove Background</label
        >
        <input type="range" id="threshold" min="100" max="255" value="180" />
        <button class="btn" onclick="nextStep(4)">➡️ Next</button>
      </div>

      <!-- STEP 4 -->
      <div class="step" id="step4">
        <div class="button-group">
          <button id="cropBtn" class="btn" onclick="startCrop()">✂️ Crop Signature</button>
          <button class="btn secondary" onclick="nextStep(5)">⏭️ Skip</button>
        </div>
        <button
          class="btn success"
          hidden
          id="applyCropBtn"
          onclick="applyCrop()"
        >
          ✅ Apply Crop
        </button>
      </div>

      <!-- STEP 5 -->
      <div class="step" id="step5">
        <div class="button-group">
          <button class="btn warning" onclick="addText()">📝 Add Text</button>
          <button class="btn success" onclick="nextStep(6)">✅ Done</button>
        </div>
        <button
          class="btn secondary"
          onclick="addMultipleTexts()"
          style="margin-top: 8px"
        >
          ➕ Add Another Text
        </button>
      </div>

      <!-- STEP 6 -->
      <div class="step" id="step6">
        <div class="button-group">
          <button class="btn success" onclick="exportImage()">
            💾 Save JPEG
          </button>
          <button class="btn" onclick="shareImage()">📤 Share</button>
        </div>
        <button
          class="btn secondary"
          onclick="nextStep(5)"
          style="margin-top: 8px"
        >
          ✏️ Continue Editing
        </button>
      </div>
    </div>

    <div class="text-toolbar" id="textToolbar">
      <button onclick="changeTextColor()">🎨 Color</button>
      <button onclick="increaseFontSize()">🔍 Larger</button>
      <button onclick="decreaseFontSize()">🔍 Smaller</button>
      <button onclick="deleteSelectedText()">🗑️ Delete</button>
    </div>

    <script>
      let originalWidth, originalHeight;
      let activeTextObject = null;

      document.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      const canvas = new fabric.Canvas("canvas", {
        enableRetinaScaling: true,
        selection: true,
        allowTouchScrolling: false,
      });


      let currentTextObject = null;

      let currentStep = 1;

      function nextStep(step) {
        document
          .getElementById(`step${currentStep}`)
          .classList.remove("active");
        currentStep = step;
        document.getElementById(`step${currentStep}`).classList.add("active");

        const titles = {
          1: "📄 Upload Document",
          2: "✍️ Add Signature",
          3: "🎨 Remove Background",
          4: "✂️ Crop Signature",
          5: "📝 Add Text",
          6: "💾 Export / Share",
        };

        document.getElementById("title").innerText = titles[currentStep];


        document.getElementById("textToolbar").style.display = "none";

        if (canvas.getActiveObject() && canvas.getActiveObject().isType("i-text")) {
          canvas.getActiveObject().exitEditing();
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
      }


      document
        .getElementById("uploadBase")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();

          reader.onload = function (f) {
            fabric.Image.fromURL(f.target.result, function (img) {
              originalWidth = img.width;
              originalHeight = img.height;

              const maxWidth = window.innerWidth - 40;
              const maxHeight = window.innerHeight - 250;

              let scale = 1;
              if (img.width > maxWidth) {
                scale = maxWidth / img.width;
              }
              if (img.height * scale > maxHeight) {
                scale = maxHeight / img.height;
              }

              const displayWidth = img.width * scale;
              const displayHeight = img.height * scale;

              canvas.setWidth(displayWidth);
              canvas.setHeight(displayHeight);

              img.scale(scale);

              canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                originX: "left",
                originY: "top",
              });

              nextStep(2);
            });
          };

          reader.readAsDataURL(file);
        });

      document
        .getElementById("uploadOverlay")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();

          reader.onload = function (f) {
            fabric.Image.fromURL(f.target.result, function (img) {
              const maxSigWidth = canvas.getWidth() * 0.4;
              let scale = maxSigWidth / img.width;
              if (scale > 0.8) scale = 0.8;
              if (scale < 0.2) scale = 0.2;

              img.set({
                left: canvas.getWidth() / 2 - (img.width * scale) / 2,
                top: canvas.getHeight() / 2 - (img.height * scale) / 2,
                scaleX: scale,
                scaleY: scale,
              });

              canvas.add(img);
              canvas.setActiveObject(img);

              prepareImageForEditing(img);

              nextStep(3);
            });
          };

          reader.readAsDataURL(file);
        });

      function addText() {
        const text = new fabric.IText("Tap to edit", {
          left: canvas.getWidth() / 2 - 100,
          top: canvas.getHeight() / 2 - 20,
          fontSize: 24,
          fill: "#000000",
          fontFamily: "system-ui, -apple-system, sans-serif",
          width: 200,
          splitByGrapheme: true,
          breakWords: true,
          padding: 0,
          hasControls: true,
          hasBorders: true,
          borderColor: "#007bff",
          cornerColor: "#007bff",
          cornerSize: 8,
          transparentCorners: false,
          editingBorderColor: "#007bff",
        });

        canvas.add(text);
        canvas.setActiveObject(text);
        canvas.renderAll();

        setupTextEvents(text);
        
        setTimeout(() => {
          if (text.enterEditing) {
            text.enterEditing();
            text.hiddenTextarea?.focus();
          }
        }, 100);
      }

      function addMultipleTexts() {
        addText();
      }

      function setupTextEvents(text) {
        text.on("editing:entered", () => {
          if (text.width < 100) {
            text.set("width", 200);
          }
          setTimeout(() => {
            const hiddenTextarea = document.querySelector(".upper-canvas ~ textarea");
            if (hiddenTextarea) {
              hiddenTextarea.style.fontSize = Math.max(16, text.fontSize) + "px";
              hiddenTextarea.style.fontFamily = text.fontFamily;
              hiddenTextarea.style.padding = "12px";
              hiddenTextarea.style.border = "2px solid #007bff";
              hiddenTextarea.style.borderRadius = "8px";
              hiddenTextarea.style.backgroundColor = "white";
              hiddenTextarea.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
              hiddenTextarea.style.whiteSpace = "pre-wrap";
              hiddenTextarea.style.wordWrap = "break-word";
              hiddenTextarea.style.overflow = "auto";
              hiddenTextarea.style.resize = "none";
              hiddenTextarea.style.width = "auto";
              hiddenTextarea.style.minWidth = "200px";
              hiddenTextarea.style.maxWidth = Math.min(canvas.getWidth() - 40, window.innerWidth - 40) + "px";
              hiddenTextarea.style.position = "fixed";
              hiddenTextarea.style.zIndex = "1000";
              const canvasRect = canvas.getElement().getBoundingClientRect();
              const textRect = text.getBoundingRect();
              const textLeft = canvasRect.left + (text.left * canvas.getZoom()) + (textRect.width / 2);
              const textTop = canvasRect.top + (text.top * canvas.getZoom()) - 50;
              
              hiddenTextarea.style.left = Math.max(10, Math.min(textLeft - 100, window.innerWidth - 200)) + "px";
              hiddenTextarea.style.top = Math.max(10, textTop) + "px";
              
              hiddenTextarea.focus();
            }
          }, 50);
        });

        text.on("editing:exited", () => {
          const hiddenTextarea = document.querySelector(".upper-canvas ~ textarea");
          if (hiddenTextarea) {
            hiddenTextarea.style.left = "";
            hiddenTextarea.style.top = "";
          }
          
          canvas.renderAll();
        });

        text.on("changed", () => {
          if (text.isEditing) {
            text.initDimensions();
            canvas.requestRenderAll();
          }
        });

        text.on("selected", () => {
          showTextToolbar(text);
        });
      }

      function showTextToolbar(textObj) {
        currentTextObject = textObj;
        const toolbar = document.getElementById("textToolbar");
        toolbar.style.display = "flex";

        clearTimeout(window.toolbarTimeout);
        window.toolbarTimeout = setTimeout(() => {
          if (!canvas.getActiveObject()) {
            toolbar.style.display = "none";
          }
        }, 3000);
      }

      function changeTextColor() {
        if (!currentTextObject) return;
        const colors = [
          "#000000",
          "#FF0000",
          "#0000FF",
          "#00FF00",
          "#FF9900",
          "#9900FF",
        ];
        const currentColor = currentTextObject.fill;
        let nextColor = colors[0];
        for (let i = 0; i < colors.length; i++) {
          if (colors[i] === currentColor) {
            nextColor = colors[(i + 1) % colors.length];
            break;
          }
        }
        currentTextObject.set("fill", nextColor);
        canvas.renderAll();
      }

      function increaseFontSize() {
        if (!currentTextObject) return;
        let newSize = currentTextObject.fontSize + 4;
        if (newSize > 72) newSize = 72;
        currentTextObject.set("fontSize", newSize);
        currentTextObject.initDimensions();
        canvas.renderAll();
      }

      function decreaseFontSize() {
        if (!currentTextObject) return;
        let newSize = currentTextObject.fontSize - 4;
        if (newSize < 12) newSize = 12;
        currentTextObject.set("fontSize", newSize);
        currentTextObject.initDimensions();
        canvas.renderAll();
      }

      function deleteSelectedText() {
        if (!currentTextObject) return;
        canvas.remove(currentTextObject);
        currentTextObject = null;
        document.getElementById("textToolbar").style.display = "none";
        canvas.discardActiveObject();
        canvas.renderAll();
      }

      function setupGlobalTextEvents() {
        canvas.on("selection:created", (e) => {
          if (e.selected && e.selected[0] && e.selected[0].isType("i-text")) {
            showTextToolbar(e.selected[0]);
          }
        });

        canvas.on("selection:updated", (e) => {
          if (e.selected && e.selected[0] && e.selected[0].isType("i-text")) {
            showTextToolbar(e.selected[0]);
          }
        });

        canvas.on("selection:cleared", () => {
          document.getElementById("textToolbar").style.display = "none";
        });
      }

      function exportImage() {
        if (canvas.getActiveObject() && canvas.getActiveObject().isType("i-text")) {
          canvas.getActiveObject().exitEditing();
        }
        
        const multiplier = originalWidth / canvas.getWidth();

        const dataURL = canvas.toDataURL({
          format: "jpeg",
          quality: 1,
          multiplier: multiplier,
        });

        const link = document.createElement("a");
        link.href = dataURL;
        link.download = "signed_document.jpg";
        link.click();
      }


      async function shareImage() {
        if (canvas.getActiveObject() && canvas.getActiveObject().isType("i-text")) {
          canvas.getActiveObject().exitEditing();
        }
        
        try {
          const multiplier = originalWidth / canvas.getWidth();

          const dataURL = canvas.toDataURL({
            format: "jpeg",
            quality: 1,
            multiplier: multiplier,
          });

          const blob = await (await fetch(dataURL)).blob();

          const file = new File([blob], "signed_document.jpg", {
            type: "image/jpeg",
          });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: "Signed Document",
            });
          } else {
            alert("Sharing not supported. Use Save instead.");
          }
        } catch (err) {
          if (err.name !== "AbortError") {
            alert("Sharing failed. Try Save instead.");
          }
        }
      }

      let cropRect;
      let activeImage;

      function startCrop() {
        const applyBtn = document.getElementById("applyCropBtn");
        const cropBtn = document.getElementById("cropBtn");
        applyBtn.hidden = false;
        cropBtn.hidden = true;

        activeImage = canvas.getActiveObject();

        if (!activeImage || activeImage.type !== "image") {
          alert("Please select the signature image first by tapping on it");
          return;
        }

        if (cropRect) {
          canvas.remove(cropRect);
        }

        cropRect = new fabric.Rect({
          left:
            activeImage.left +
            (activeImage.width * activeImage.scaleX) / 2 -
            100,
          top:
            activeImage.top +
            (activeImage.height * activeImage.scaleY) / 2 -
            50,
          width: 200,
          height: 100,
          fill: "rgba(0,255,0,0.2)",
          stroke: "#00ff00",
          strokeWidth: 3,
          originX: "left",
          originY: "top",
          hasControls: true,
          hasBorders: true,
          lockRotation: true,
        });

        canvas.add(cropRect);
        canvas.setActiveObject(cropRect);
        canvas.renderAll();
      }

      function applyCrop() {
        if (!cropRect || !activeImage) return;

        const crop = cropRect.getBoundingRect();

        const imgMatrix = activeImage.calcTransformMatrix();
        const inverted = fabric.util.invertTransform(imgMatrix);

        const topLeft = fabric.util.transformPoint(
          new fabric.Point(crop.left, crop.top),
          inverted,
        );

        const bottomRight = fabric.util.transformPoint(
          new fabric.Point(crop.left + crop.width, crop.top + crop.height),
          inverted,
        );

        activeImage.clipPath = new fabric.Rect({
          left: topLeft.x,
          top: topLeft.y,
          width: bottomRight.x - topLeft.x,
          height: bottomRight.y - topLeft.y,
        });

        canvas.remove(cropRect);
        cropRect = null;

        canvas.setActiveObject(activeImage);
        canvas.renderAll();

        prepareImageForEditing(activeImage);

        document.getElementById("applyCropBtn").hidden = true;

        nextStep(5);
      }

      function prepareImageForEditing(imgObj) {
        if (!imgObj._element) return;

        const imgEl = imgObj._element;

        const tempCanvas = document.createElement("canvas");
        const ctx = tempCanvas.getContext("2d");

        tempCanvas.width = imgEl.naturalWidth;
        tempCanvas.height = imgEl.naturalHeight;

        ctx.drawImage(imgEl, 0, 0);

        imgObj._originalData = ctx.getImageData(
          0,
          0,
          tempCanvas.width,
          tempCanvas.height,
        );
      }

      document
        .getElementById("threshold")
        .addEventListener("input", function () {
          const obj = canvas.getActiveObject();
          if (!obj || obj.type !== "image" || !obj._originalData) return;

          const threshold = parseInt(this.value);
          const original = obj._originalData;

          const tempCanvas = document.createElement("canvas");
          const ctx = tempCanvas.getContext("2d");

          tempCanvas.width = original.width;
          tempCanvas.height = original.height;

          const data = new ImageData(
            new Uint8ClampedArray(original.data),
            original.width,
            original.height,
          );

          const d = data.data;

          for (let i = 0; i < d.length; i += 4) {
            const brightness = (d[i] + d[i + 1] + d[i + 2]) / 3;
            if (brightness > threshold) d[i + 3] = 0;
          }

          ctx.putImageData(data, 0, 0);

          obj.setSrc(tempCanvas.toDataURL(), () => {
            canvas.renderAll();
          });
        });

      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });

      canvas.setWidth(window.innerWidth - 40);
      canvas.setHeight(400);
      canvas.renderAll();
      setupGlobalTextEvents();
      
      canvas.on("mouse:down", (e) => {
        e.e.preventDefault();
      });
    </script>
  </body>
</html>
